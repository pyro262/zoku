name: Feature request
description: Suggest a new widget, theme, or capability
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like Zoku to do?
      description: Describe the feature and the problem it solves for you.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else
      description: Mockups, examples from other tools, telemetry fields involved, etc.
